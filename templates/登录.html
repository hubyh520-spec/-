<!-- templates/login.html - iOS风格登录页 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AC云验证 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 34px;
            padding: 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header i {
            font-size: 52px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        
        .login-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1d1c1f;
        }
        
        .login-header p {
            color: #6c6c70;
            font-size: 14px;
            margin-top: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #6c6c70;
        }
        
        .input-group {
            display: flex;
            align-items: center;
            background: #f5f5f7;
            border-radius: 14px;
            border: 0.5px solid rgba(60, 60, 67, 0.08);
            transition: all 0.2s ease;
        }
        
        .input-group:focus-within {
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }
        
        .input-group i {
            padding: 0 16px;
            color: #007aff;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px 16px 15px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            color: #1d1c1f;
            font-family: inherit;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #007aff;
            color: white;
            font-family: inherit;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            font-size: 14px;
        }
        
        .links a {
            color: #007aff;
            text-decoration: none;
        }
        
        .error {
            background: #ffe9e9;
            color: #ff3b30;
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: #8e8e93;
            text-decoration: none;
            font-size: 13px;
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }
            .login-header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>登录账号</h2>
                <p>AC云验证平台</p>
            </div>
            {% if error %}
            <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label>用户ID / 邮箱</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" placeholder="请输入用户ID或邮箱" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="请输入密码" required>
                    </div>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>
            <div class="links">
                <a href="/register">注册账号</a>
                <a href="javascript:alert('请联系管理员重置密码')">忘记密码？</a>
            </div>
            <div class="back-home">
                <a href="/">← 返回首页</a>
            </div>
        </div>
    </div>
</body>
</html>
